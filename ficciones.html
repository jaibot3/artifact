<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>ficciones</title>
  
  <!-- Google Sans & Noto Sans KR (구글 기본 한글 폰트) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      min-height: 100%;
      background: #eff2f0;
      /* 명조체 제거, 구글 기본 산세리프 폰트로 변경 */
      font-family: 'Google Sans', 'Jost', 'Noto Sans KR', sans-serif;
      color: #38221e;
      -webkit-text-size-adjust: 100%;
      word-break: keep-all;
    }

    /* ── 상단 (← Index 오른쪽) ── */
    .top {
      display: flex;
      justify-content: flex-end;
      padding: 36px 6% 0;
      position: relative;
      z-index: 10; /* 타이틀보다 위에서 클릭 가능하게 */
    }
    .back {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8a7f70;
      text-decoration: none;
      transition: color .3s;
    }
    .back:hover { color: #38221e; }

    /* ── ficciones 타이틀 (work1 메뉴와 동일한 위치/스타일) ── */
    .page-title {
      font-size: 70px;
      font-weight: 700;
      color: #ded26e;
      line-height: 1.1; /* 문장이 길어질 경우를 대비한 줄간격 조정 */
      letter-spacing: 0.5px;
      padding: 36px 6% 0; /* 화면 가장자리에 붙지 않도록 top과 동일한 패딩 적용 */
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none; /* 고정 타이틀이 아래 본문 클릭을 방해하지 않도록 설정 */
      z-index: 1;
    }

    /* ── 본문 레이아웃 (좌측 정렬) ── */
    .content-wrap {
      /* 고정된 타이틀 길이를 고려하여 충분히 아래로 밀어냄 */
      padding-top: 220px; 
      padding-left: 6%;
      padding-right: 6%;
      max-width: 800px; /* 텍스트 라인 길이가 너무 길어지지 않게 통제 */
    }

    article {
      margin-bottom: 120px;
      text-align: left; /* 요청한 왼쪽 정렬 */
    }

    .post-title {
      font-size: 23px;
      font-weight: 500;
      color: #66625b;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    /* ── 메타 데이터 텍스트박스 설정 ── */
    .post-meta {
      display: inline-flex;
      align-items: left;
      gap: 16px;
      background: #ffffff; /* 배경과 대비되는 박스 색상 */
      border: 0px solid #d8cfbf; /* 옅은 테두리 */
      padding: 6px 16px;
      border-radius: 0px; /* 약간의 둥근 모서리로 박스 형태 강조 */
      font-size: 12px;
      font-weight: 500;
      color: #36332f;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    .post-body {
      font-size: 16px;
      line-height: 1.8;
      color: #38221e;
    }
    
    .post-body p {
      margin-bottom: 24px;
    }

    /* ── 모바일 반응형 (work1과 동일) ── */
    @media (max-width: 640px) {
      .top { padding: 28px 5% 0; }
      .page-title { 
        font-size: 53px; 
        padding: 20px 5% 32px; 
      }
      .content-wrap { 
        padding-top: 180px; 
        padding-left: 5%;
        padding-right: 5%;
      }
      .post-title { font-size: 22px; }
      .post-body { font-size: 15px; }
    }
  </style>
</head>
<body>

  <!-- 오른쪽 상단 Index 링크 -->
  <div class="top">
    <a href="index.html" class="back">← Index</a>
  </div>

  <!-- 요청한 원본 타이틀 문구 유지 및 work1 스타일 적용 -->
  <h1 class="page-title">Fiction. Reality if you insist.</h1>

  <!-- 블로그 게시물이 렌더링될 영역 -->
  <div class="content-wrap">
    <main>
      <article>
        <h2 class="post-title">Man I know</h2>
        
        <!-- 날짜 및 카테고리 텍스트박스 -->
        <div class="post-meta">
          <span>July 10, 2026</span>
          <span>|</span>
          <span>Critique</span>
        </div>

        <div class="post-body">
          <p></p>
          <p></p>
        </div>
      </article>
    </main>
  </div>

</body>
</html>
