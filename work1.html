<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;700&display=swap" rel="stylesheet">
  <title>Work</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      min-height: 100%;
      background: #f7f6f3;
      font-family: 'Jost', 'Century Gothic', CenturyGothic, sans-serif;
      color: #38221e;
      -webkit-text-size-adjust: 100%;
    }

    /* ── 상단 (← Index 오른쪽) ── */
    .top {
      display: flex;
      justify-content: flex-end;
      padding: 36px 6% 0;
    }
    .back {
      font-family: 'Jost', 'Century Gothic', CenturyGothic, sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8a7f70;
      text-decoration: none;
      transition: color .3s;
    }
    .back:hover { color: #38221e; }

    /* ── Work 타이틀 (index.html 메뉴와 동일) ── */
    .page-title {
      font-size: 76px;
      font-weight: 700;
      color: #ded26e;
      line-height: 1;
      letter-spacing: 0.5px;
      padding: 0 0 40px 0;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── 카테고리 탭 ── */
    .cat-nav {
      padding: 0 6% 40px;
      display: flex;
      gap: 24px;
    }
    .cat-nav a {
      font-size: 13px;
      color: #9c9586;
      text-decoration: none;
      transition: color .2s;
    }
    .cat-nav a.active { color: #38221e; }
    .cat-nav a:hover  { color: #38221e; }

    /* fixed title 아래로 본문 밀기 */
    .content-wrap {
      padding-top: 96px;
    }
    .projects { padding: 0 6% 120px; }

    .project {
      display: grid;
      grid-template-columns: 28% 1fr;
      min-height: 55vh;
      padding: 40px 0;
    }

    /* 왼쪽 텍스트 */
    .project-info {
      padding-right: 5%;
      padding-top: 4px;
    }
    .project-name {
      font-size: 15px;
      font-weight: 400;
      color: #38221e;
      margin-bottom: 16px;
      letter-spacing: -0.2px;
    }
    .project-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .project-meta span {
      font-size: 13px;
      color: #6b5f52;
    }

    /* 오른쪽 이미지 */
    .project-img-wrap {
      display: block;
      overflow: hidden;
      text-decoration: none;
    }
    .project-img-wrap img {
      width: 100%;
      /* aspect-ratio: 3/2; */
      /* object-fit: cover; */
      display: block;
      transition: opacity .35s ease;
      background: #d8cfbf;
    }
    .project-img-wrap:hover img { opacity: 0.86; }

    .img-ph {
      width: 100%;
      aspect-ratio: 3/2;
      background: #d8cfbf;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      letter-spacing: 3px;
      color: #9c9586;
      text-transform: uppercase;
    }

    /* ── 모바일 ── */
    @media (max-width: 640px) {
      .page-title { font-size: 53px; padding: 20px 5% 32px; }
      .top { padding: 28px 5% 0; }
      .cat-nav { padding: 0 5% 32px; }
      .projects { padding: 0 5% 80px; }
      .project {
        grid-template-columns: 1fr;
        gap: 16px;
        min-height: unset;
        padding: 28px 0;
      }
      .project-info { padding-right: 0; }
    }
  </style>
</head>
<body>

  <!-- 오른쪽 상단 Index 링크 (rose.html과 동일 위치) -->
  <div class="top">
    <a href="index.html" class="back">← Index</a>
  </div>

  <!-- Work 타이틀 -->
  <h1 class="page-title">Work</h1>

  <div class="content-wrap">
  <!-- 카테고리 -->
  <nav class="cat-nav">
    <a href="work1.html" class="active">Branding</a>
  </nav>

  <!-- ▼▼▼ 프로젝트 목록 ▼▼▼ -->
  <div class="projects">

    <div class="project">
      <div class="project-info">
        <p class="project-name">Lethe, still shimmering</p>
        <div class="project-meta">
          <span>Art project for S.A.K.K</span>
          <span>Seoul, 2026</span>
          <span>Credit
Performed by Sungeun Park Filmed by Sungsu Directed by Jaylim </span>
        </div>
      </div>
      <a class="project-img-wrap" href="work1_list.html">
        <img src="lethe_video.jpg" alt="Project 01"
             onerror="this.outerHTML='<div class=\'img-ph\'>project 01</div>'">
      </a>
    </div>

    <div class="project">
      <div class="project-info">
        <p class="project-name">Project Name</p>
        <div class="project-meta">
          <span>Category</span>
          <span>Location, Year</span>
        </div>
      </div>
      <a class="project-img-wrap" href="work1_project2.html">
        <img src="project2_thumb.jpg" alt="Project 02"
             onerror="this.outerHTML='<div class=\'img-ph\'>project 02</div>'">
      </a>
    </div>

    <div class="project">
      <div class="project-info">
        <p class="project-name">Project Name</p>
        <div class="project-meta">
          <span>Category</span>
          <span>Location, Year</span>
        </div>
      </div>
      <a class="project-img-wrap" href="work1_project3.html">
        <img src="project3_thumb.jpg" alt="Project 03"
             onerror="this.outerHTML='<div class=\'img-ph\'>project 03</div>'">
      </a>
    </div>

  </div>
  <!-- ▲▲▲ 여기까지 ▲▲▲ -->
  </div>

</body>
</html>
