    *, *::before, *::after {

    .page-header {

      z-index: 10;

      text-align: left;

      font-size: 12px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 1px;

      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.5px;

      right: 0;

      font-family: 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
      font-size: 10px; 
      letter-spacing: 3px; 
      text-transform: uppercase;
      color: var(--ink-3); 
      text-decoration: none; 
      transition: color 0.3s ease;
    }
    
    .back:hover { 
      color: var(--ink); 
    }
    
    /* ── 중앙 본문 ── */
    .sheet { 
      position: relative; 
      z-index: 1; 
      width: 100%; 
      max-width: 720px; 
      padding-top: 300px; /* 고정된 시 구절과 글이 겹치지 않게 여백 확보 */
    }
    
    .entries { 
      display: flex; 
      flex-direction: column; 
      gap: 80px; 
    }
    
    .entry-meta { 
      display: flex; 
      align-items: baseline; 
      gap: 22px; 
      margin-bottom: 22px; 
    }
    
    .entry-meta .num {
      font-size: 42px; 
      line-height: 1; 
      letter-spacing: -1px;
      font-weight: normal; 
      color: var(--num);
    }
    
    .entry-meta .day {
      font-size: 30px; 
      line-height: 0.7; 
      letter-spacing: -1px;
      font-weight: normal; 
      color: var(--ink);
    }

      font-size: 11px; 
      letter-spacing: 4px; 
      text-transform: uppercase;
      color: var(--ink-3); 
      font-style: italic;
    }
    
    .entry-body {

      line-height: 28px; 
      color: var(--ink);

      font-weight: 400;

(() => {
  const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
  const WEEKDAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
  const $list = document.getElementById('entries');

  if (!ENTRIES.length) { 
    $list.innerHTML = '<div class="empty">no entries yet.</div>'; 
    return; 
  }

  const sortedAsc = [...ENTRIES].sort((a, b) => a.date.localeCompare(b.date));
  sortedAsc.forEach((e, i) => { e.__num = i + 1; });
  const sortedDesc = [...sortedAsc].reverse();

  function fmt(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return { 
      day: String(d).padStart(2, '0'), 
      rest: `${MONTHS[m - 1]} ${y} · ${WEEKDAYS[dt.getDay()]}` 
    };
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    })[c]);
  }

  $list.innerHTML = sortedDesc.map(e => {
    const { day, rest } = fmt(e.date);
    return `
      <article>
        <div class="entry-meta">
          <span class="num">${String(e.__num).padStart(2, '0')}</span>
          <span class="day">${day}</span>
          <span class="rest">${rest}</span>
        </div>
        <div class="entry-body">${escapeHtml(e.text)}</div>
      </article>
    `;
  }).join('');

  function activateScatter(body) {
    const text = body.textContent;
    body.textContent = '';
    const chars = [];
    
    for (const ch of text) {
      if (ch === ' ' || ch === '\n' || ch === '\t' || ch === '\r') {
        body.appendChild(document.createTextNode(ch));
      } else {
        const span = document.createElement('span');
        span.className = 'ch';
        span.textContent = ch;
        body.appendChild(span);
        chars.push(span);
      }
    }
    
    if (!chars.length) return;

    const RADIUS = 95;
    const PUSH = 34;
    const BLUR = 3.4;

    let centers = [];
    let raf = null;
    let pending = null;

    function cache() {
      centers = chars.map(c => {
        const r = c.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      });
    }

    function render() {
      raf = null;
      if (!pending) return;
      
      const { mx, my } = pending;
      
      for (let i = 0; i < chars.length; i++) {
        const c = centers[i];
        if (!c) continue;
        
        const dx = c.x - mx, dy = c.y - my;
        const dist = Math.hypot(dx, dy);
        
        if (dist < RADIUS) {
          const f = 1 - dist / RADIUS;
          const e = f * f;
          const inv = dist || 1;
          const tx = (dx / inv) * PUSH * e;
          const ty = (dy / inv) * PUSH * e;
          
          chars[i].style.transform = `translate(${tx}px, ${ty}px)`;
          chars[i].style.filter = `blur(${(BLUR * e).toFixed(2)}px)`;
          chars[i].style.opacity = (1 - 0.85 * e).toFixed(3);
        }
      }
    }

    body.addEventListener('mouseenter', cache);
    body.addEventListener('mousemove', ev => {
      pending = { mx: ev.clientX, my: ev.clientY };
      if (!raf) raf = requestAnimationFrame(render);
    });
    
    window.addEventListener('scroll', cache, { passive: true });
    window.addEventListener('resize', cache);
  }

  // 모든 entry-body 요소에 activateScatter 효과 적용
  const allBodies = $list.querySelectorAll('.entry-body');
  allBodies.forEach(body => activateScatter(body));

})();
</script>
</body>
</html>
