<head>

  <style>
    /* Reset & Base Variables */
    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    :root {
      --ink: #474039;
      --ink-3: #8a7f70;
      --rule: rgba(38, 34, 30, 0.12);
      --num: #ded36ebb;
    }
    
    html, body {
      min-height: 100%;
      font-family: 'Apple Symbols', 'AppleSymbols', 'Apple Symbol', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    
    body {
      background: radial-gradient(120% 90% at 50% 0%, #F2F5E8 0%, #e8e9e4 55%, #e8e9e4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 112px 24px 120px;
    }
    
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.10;
      mix-blend-mode: multiply;
      background-image:
        radial-gradient(rgba(70,55,40,0.18) 1px, transparent 1px),
        radial-gradient(rgba(70,55,40,0.1) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 2px;
      z-index: 0;
    }
    
    /* Layout & Header */
    .sheet { 
      position: relative; 
      z-index: 1; 
      width: 100%; 
      max-width: 720px; 
    }
    
    .top { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-start; 
      padding-bottom: 56px; 
    }
    
    .page-header {
      font-family: 'Jost', 'Apple Symbols', -apple-system, sans-serif;
      text-align: left;
    }
    
    .ph-verse {
      font-size: 30px;
      font-weight: 700;
      line-height: 44px;
      letter-spacing: 0.5px;
      color: #ded26e;
      white-space: pre-wrap;
    }
    
    .ph-src {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 1px;
      color: var(--ink-3);
    }
    
    .ph-sub {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: #ded26e;
    }
    
    .back {
      font-family: 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
      font-size: 10px; 
      letter-spacing: 3px; 
      text-transform: uppercase;
      color: var(--ink-3); 
      text-decoration: none; 
      transition: color 0.3s ease;
    }
    
    .back:hover { 
      color: var(--ink); 
    }
    
    /* Entries Section */
    .entries { 
      display: flex; 
      flex-direction: column; 
      gap: 80px; 
    }
    
    .entry-meta { 
      display: flex; 
      align-items: baseline; 
      gap: 22px; 
      margin-bottom: 22px; 
    }
    
    .entry-meta .num {
      font-size: 42px; 
      line-height: 1; 
      letter-spacing: -1px;
      font-weight: normal; 
      color: var(--num);
    }
    
    .entry-meta .day {
      font-size: 30px; 
      line-height: 0.7; 
      letter-spacing: -1px;
      font-weight: normal; 
      color: var(--ink);
    }
    
    .entry-meta .rest {
      font-size: 11px; 
      letter-spacing: 4px; 
      text-transform: uppercase;
      color: var(--ink-3); 
      font-style: italic;
    }
    
    .entry-body {
      font-size: 15px; 
      line-height: 28px; 
      color: var(--ink);
      white-space: pre-wrap; 
      font-weight: 400; 
      letter-spacing: -0.2px;
      user-select: none; 
      -webkit-user-select: none; 
    }
    
    .entry-body .ch {
      display: inline-block;
      transition: transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1),
                  filter 0.55s ease,
                  opacity 0.55s ease;
      will-change: transform, filter, opacity;
    }
    
    .entries article:not(:first-child) { 
      opacity: 0.1; 
      pointer-events: none; 
    }
    
    .empty {
      text-align: center; 
      font-size: 12px; 
      font-style: italic;
      color: var(--ink-3); 
      letter-spacing: 2px; 
      padding: 80px 0;
    }
  </style>
</head>

      </div>

  </div>
