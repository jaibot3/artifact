<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>A Million Roses</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #474039;
      --ink-3:  #8a7f70;
      --rule:   rgba(38, 34, 30, 0.12);
      --num:    #ded36ebb;
    }

    html, body {
      min-height: 100%;
      /* 💡 무ㅓㄹ 보십니까?? 이것까지 lol. 귀엽군요. 제미나이 기본 UI 스타일입니다. 기호 무드를 살린 뒤, 한글과 본문은 가장 깔끔한 시스템 고딕 체계로 매칭 */
      font-family: 'Apple Symbols', 'AppleSymbols', 'Apple Symbol', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased; /* 글자를 조금 더 선명하고 얇게 다듬어주는 옵션 */
    }

    body {
      background: radial-gradient(120% 90% at 50% 0%, #f6f1e6 0%, #ece3d2 55%, #e3d8c2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 56px 24px 120px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.10;
      mix-blend-mode: multiply;
      background-image:
        radial-gradient(rgba(70,55,40,0.18) 1px, transparent 1px),
        radial-gradient(rgba(70,55,40,0.1)  1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 2px;
      z-index: 0;
    }

    .sheet {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      padding-bottom: 56px;
    }

    .back {
      font-family: 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-3);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .back:hover { color: var(--ink); }

    /* ── Entries ───────────────────────────────────── */
    .entries {
      display: flex;
      flex-direction: column;
      gap: 80px;
    }

    .entry-meta {
      display: flex;
      align-items: baseline;
      gap: 22px;
      margin-bottom: 22px;
    }

   .entry-meta .num {
  font-size: 42px; /* 번호 크기 */
  line-height: 1;
  letter-spacing: -1px;
  font-weight: normal;
  color: var(--num);
}

.entry-meta .day {
  font-size: 30px; /* 날짜 크기 */
  line-height: 0.7;
  letter-spacing: -1px;
  font-weight: normal;
  color: var(--ink);
}

    .entry-meta .num { color: var(--num); }
    .entry-meta .day { color: var(--ink); }

    .entry-meta .rest {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ink-3);
      font-style: italic;
    }

    .entry-body {
      font-size: 15px;
      line-height: 28px;
      color: var(--ink);
      white-space: pre-wrap;
      font-weight: 400;
      letter-spacing: -0.2px; /* 자간을 미세하게 좁혀 제미나이 특유의 단정함을 유도 */
    }

    /* 💧 글자 흩어짐(물결) 효과 — 한 글자씩 span으로 쪼갠 뒤 transform/blur/opacity 트랜지션.
       cubic-bezier로 밀려났다가 천천히 제자리로 돌아오게 해서, 커서가 지나갈 때 물결치듯 보임. */
    .entry-body .ch {
      display: inline-block;
      transition: transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1),
                  filter   0.55s ease,
                  opacity  0.55s ease;
      will-change: transform, filter, opacity;
    }

    /* most recent = full ; rest faded */
    .entries article:not(:first-child) {
      opacity: 0.07;
      pointer-events: none;
    }

    /* 전체 텍스트 선택/복사 방지 */
    .entry-body {
      user-select: none;
      -webkit-user-select: none;
    }

    .empty {
      text-align: center;
      font-size: 12px;
      font-style: italic;
      color: var(--ink-3);
      letter-spacing: 2px;
      padding: 80px 0;
    }
  </style>
</head>
<body oncontextmenu="return false" oncopy="return false">

  <div class="sheet">

    <header class="top">
      <a href="index.html" class="back">← Index</a>
    </header>

    <section class="entries" id="entries"></section>

  </div>

<script>
// ============================================================
//  ▼ 여기에 글을 추가하세요. (위쪽이 최신)
//    날짜 형식: YYYY-MM-DD
// ============================================================
const ENTRIES = [
  {
    date: '2026-06-24',
    text: `고성`
  },
  {
    date: '2026-06-23',
    text: `나는 부끄러워서 네 눈을 쳐다보지 못했고, 너는 우스워했지. 
    
붐비는 지하철 인파에 떠밀려 너를 안으면- 
네가 나에게 사랑한다 하고- 나는 고개를 떨구었다 다시 고개를 들어 귓속말로 "나도"라고 속삭이곤 했는데. 밉살스런 표정으로-
내 볼에 닿아있는 너의 목에서 나는 냄새. 향기. 체취. 
만나면서 항상 
언제나 항상 너를. 모든 순간에 사랑하지 않은 적이 없어. 
그리고 그거면 충분해. 미안해 (2017.03.10)
`
  },
  {
    date: '2026-06-22',
    text: `모르지.`
  },
  {
    date: '2026-06-18',
    text: ``
  },
  {
    date: '2026-06-12',
    text: `a. 술래를 잡으러 다가오듯 사방에서 나를 향해 아주 조금씩 그리고 점점 밀도있게 조여오는 느낌. 
얼굴을 가렸던 손을 내리면 언제나 편안하고 인자한 웃음과 함께 "무궁화 꽃이 피었습니다." 
b. 그 책장이 나를 거부한 날, 미처 그곳에서 내 자존심을  꺼내들고 오지 못했다.
c. 그는 마치 안으로 들어오는 문이 3개인 7평짜리 공간처럼
사람들의 여러 다리가 우수수수 안으로 들어왔다가 머물렀다가 나가고 또 들어왔다가 나갔다. 
d. 맡잡은 손은 질척이는 지렁이처럼 그의 손목을 타고 피부속으로 들어가 기어이

기어이 그 훵한 공허를 해집어 놓았다. 공허라 해집어놓을 것도 없어 웃긴 소리지만

집요하게. 뭘 쫓았지?

마치 분명 들고나간 적 없는데 집안에서 사라진 () 물건을 찾듯이. '이상하다.' 

'왜 없지?' 

[뭐가] 있어야했나... 

​

[ 청량함과 담백함은 사라지고

온 몸을 가득 메울,

목구멍으로 꾸덕꾸덕 넘어 가득차는 괴로움을 ]

e. cheers.

​`
  },
];
// ============================================================

(() => {
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const WEEKDAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  const $list = document.getElementById('entries');

  if (!ENTRIES.length) {
    $list.innerHTML = '<div class="empty">no entries yet.</div>';
    return;
  }

  const sortedAsc = [...ENTRIES].sort((a, b) => a.date.localeCompare(b.date));
  sortedAsc.forEach((e, i) => { e.__num = i + 1; });

  const sortedDesc = [...sortedAsc].reverse();

  function fmt(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return {
      day:  String(d).padStart(2, '0'),
      rest: `${MONTHS[m - 1]} ${y} · ${WEEKDAYS[dt.getDay()]}`
    };
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  $list.innerHTML = sortedDesc.map(e => {
    const { day, rest } = fmt(e.date);
    return `
      <article>
        <div class="entry-meta">
          <span class="num">${String(e.__num).padStart(2, '0')}</span>
          <span class="day">${day}</span>
          <span class="rest">${rest}</span>
        </div>
        <div class="entry-body">${escapeHtml(e.text)}</div>
      </article>
    `;
  }).join('');

  // ============================================================
  //  💧 글자 흩어짐(물결 + 뿌옇게) 효과
  //  커서 주변 글자를 방사형으로 밀어내고 + blur + opacity 감소.
  //  반경 안에서 가까울수록 강해지고(제곱 가속), 빠져나가면 천천히 복귀.
  // ============================================================
  function activateScatter(body) {
    // 1) 본문을 한 글자씩 span으로 분해. 공백/줄바꿈은 텍스트 노드로 그대로 둬서
    //    pre-wrap 레이아웃(들여쓰기·줄바꿈)을 깨지 않게 한다.
    const text = body.textContent;
    body.textContent = '';
    const chars = [];
    for (const ch of text) {
      if (ch === ' ' || ch === '\n' || ch === '\t' || ch === '\r') {
        body.appendChild(document.createTextNode(ch));
      } else {
        const span = document.createElement('span');
        span.className = 'ch';
        span.textContent = ch;
        body.appendChild(span);
        chars.push(span);
      }
    }
    if (!chars.length) return;

    const RADIUS = 95;   // 영향 반경(px)
    const PUSH   = 34;   // 최대 밀어내는 거리(px)
    const BLUR   = 3.4;  // 최대 흐림(px)

    let centers = [];    // 글자별 '원래' 중심좌표 캐시(transform 적용 전 기준)
    let raf = null;
    let pending = null;

    function cache() {
      centers = chars.map(c => {
        const r = c.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      });
    }

    function render() {
      raf = null;
      if (!pending) return;
      const { mx, my } = pending;
      for (let i = 0; i < chars.length; i++) {
        const c = centers[i];
        if (!c) continue;
        const dx = c.x - mx, dy = c.y - my;
        const dist = Math.hypot(dx, dy);
        if (dist < RADIUS) {
          const f = 1 - dist / RADIUS;   // 0~1, 가까울수록 1
          const e = f * f;               // 제곱 가속 → 가까울수록 급격히 흩어짐
          const inv = dist || 1;
          const tx = (dx / inv) * PUSH * e;
          const ty = (dy / inv) * PUSH * e;
          chars[i].style.transform = `translate(${tx}px, ${ty}px)`;
          chars[i].style.filter = `blur(${(BLUR * e).toFixed(2)}px)`;
          chars[i].style.opacity = (1 - 0.85 * e).toFixed(3);
        } else if (chars[i].style.transform) {
          chars[i].style.transform = '';
          chars[i].style.filter = '';
          chars[i].style.opacity = '';
        }
      }
    }

    body.addEventListener('mouseenter', cache);
    body.addEventListener('mousemove', ev => {
      pending = { mx: ev.clientX, my: ev.clientY };
      if (!raf) raf = requestAnimationFrame(render);
    });
    body.addEventListener('mouseleave', () => {
      pending = null;
      for (const c of chars) {
        c.style.transform = '';
        c.style.filter = '';
        c.style.opacity = '';
      }
    });
    window.addEventListener('scroll', cache, { passive: true });
    window.addEventListener('resize', cache);
  }

  // 가장 최신(맨 위) 글에만 적용 — 나머지는 흐려서 pointer-events:none 상태.
  const firstBody = $list.querySelector('article:first-child .entry-body');
  if (firstBody) activateScatter(firstBody);
})();
</script>
</body>
</html>
