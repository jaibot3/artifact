<!DOCTYPE html>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink:    #474039;
      --ink-3:  #8a7f70;
      --rule:   rgba(38, 34, 30, 0.12);
      --num:    #ded36ebb;
    }
    html, body {
      min-height: 100%;
      font-family: 'Apple Symbols', 'AppleSymbols', 'Apple Symbol', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: radial-gradient(120% 90% at 50% 0%, #f6f1e6 0%, #ece3d2 55%, #e3d8c2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 56px 24px 120px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.10;
      mix-blend-mode: multiply;
      background-image:
        radial-gradient(rgba(70,55,40,0.18) 1px, transparent 1px),
        radial-gradient(rgba(70,55,40,0.1)  1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 2px;
      z-index: 0;
    }
    .sheet { position: relative; z-index: 1; width: 100%; max-width: 720px; }
    .top { display: flex; justify-content: flex-end; padding-bottom: 56px; }
    .back {
      font-family: 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink-3); text-decoration: none; transition: color 0.3s ease;
    }
    .back:hover { color: var(--ink); }
    .entries { display: flex; flex-direction: column; gap: 80px; }
    .entry-meta { display: flex; align-items: baseline; gap: 22px; margin-bottom: 22px; }
    .entry-meta .num {
      font-size: 42px; line-height: 1; letter-spacing: -1px;
      font-weight: normal; color: var(--num);
    }
    .entry-meta .day {
      font-size: 30px; line-height: 0.7; letter-spacing: -1px;
      font-weight: normal; color: var(--ink);
    }
    .entry-meta .rest {
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--ink-3); font-style: italic;
    }
    .entry-body {
      font-size: 15px; line-height: 28px; color: var(--ink);
      white-space: pre-wrap; font-weight: 400; letter-spacing: -0.2px;
    }
    .entry-body .ch {
      display: inline-block;
      transition: transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1),
                  filter   0.55s ease,
                  opacity  0.55s ease;
      will-change: transform, filter, opacity;
    }
    .entries article:not(:first-child) { opacity: 0.1; pointer-events: none; }
    .entry-body { user-select: none; -webkit-user-select: none; }
    .empty {
      text-align: center; font-size: 12px; font-style: italic;
      color: var(--ink-3); letter-spacing: 2px; padding: 80px 0;
    }
  </style>
</head>

(() => {
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const WEEKDAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const $list = document.getElementById('entries');

  if (!ENTRIES.length) { $list.innerHTML = '<div class="empty">no entries yet.</div>'; return; }

  const sortedAsc = [...ENTRIES].sort((a, b) => a.date.localeCompare(b.date));
  sortedAsc.forEach((e, i) => { e.__num = i + 1; });
  const sortedDesc = [...sortedAsc].reverse();

  function fmt(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return { day: String(d).padStart(2, '0'), rest: `${MONTHS[m-1]} ${y} · ${WEEKDAYS[dt.getDay()]}` };
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  $list.innerHTML = sortedDesc.map(e => {
    const { day, rest } = fmt(e.date);
    return `
      <article>
        <div class="entry-meta">
          <span class="num">${String(e.__num).padStart(2,'0')}</span>
          <span class="day">${day}</span>
          <span class="rest">${rest}</span>
        </div>
        <div class="entry-body">${escapeHtml(e.text)}</div>
      </article>
    `;
  }).join('');

  function activateScatter(body) {
    const text = body.textContent;
    body.textContent = '';
    const chars = [];
    for (const ch of text) {
      if (ch === ' ' || ch === '\n' || ch === '\t' || ch === '\r') {
        body.appendChild(document.createTextNode(ch));
      } else {
        const span = document.createElement('span');
        span.className = 'ch';
        span.textContent = ch;
        body.appendChild(span);
        chars.push(span);
      }
    }
    if (!chars.length) return;

    const RADIUS = 95;
    const PUSH   = 34;
    const BLUR   = 3.4;

    let centers = [];
    let raf = null;
    let pending = null;

    function cache() {
      centers = chars.map(c => {
        const r = c.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      });
    }

    function render() {
      raf = null;
      if (!pending) return;
      const { mx, my } = pending;
      for (let i = 0; i < chars.length; i++) {
        const c = centers[i];
        if (!c) continue;
        const dx = c.x - mx, dy = c.y - my;
        const dist = Math.hypot(dx, dy);
        if (dist < RADIUS) {
          const f = 1 - dist / RADIUS;
          const e = f * f;
          const inv = dist || 1;
          const tx = (dx / inv) * PUSH * e;
          const ty = (dy / inv) * PUSH * e;
          chars[i].style.transform = `translate(${tx}px, ${ty}px)`;
          chars[i].style.filter    = `blur(${(BLUR * e).toFixed(2)}px)`;
          chars[i].style.opacity   = (1 - 0.85 * e).toFixed(3);
        }
        // ← mouseleave 리셋 없음: 한번 퍼진 글자는 그 자리에 유지
      }
    }

    body.addEventListener('mouseenter', cache);
    body.addEventListener('mousemove', ev => {
      pending = { mx: ev.clientX, my: ev.clientY };
      if (!raf) raf = requestAnimationFrame(render);
    });
    // mouseleave 리셋 제거 — 효과 영구 유지
    window.addEventListener('scroll', cache, { passive: true });
    window.addEventListener('resize', cache);
  }

  const firstBody = $list.querySelector('article:first-child .entry-body');
  if (firstBody) activateScatter(firstBody);
})();
