<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap" rel="stylesheet">
  <title>Stipple Spinning Top v2 - Strict Hover Physics</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      background: radial-gradient(120% 90% at 50% 0%, #F2F5E8 0%, #e8e9e4 55%, #e3d8c2 100%);
      font-family: 'Jost', 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* ============================================================
       무ㅓㄹ봐ㅏㅏㅏㅏㅏ ㅋㅋㅋㅋ 좌측 텍스트 메뉴 레이아웃 (Work, Work, Ficciones)
       ============================================================ */
    .menu-container {
      position: absolute;
      left: 12%;
      top: 23%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;   /* 각 글자 폭에 맞춤 (rain 충돌 영역이 단어별로 정확해짐) */
      gap: 0px; 
      user-select: none;
      z-index: 2;
    }
    .menu-item {
      font-size: 76px;
      font-weight: 700;
      color: #ded26e; 
      text-decoration: none;
      line-height: 1.1;
      letter-spacing: 0.5px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .menu-item:hover {
      opacity: 0.7;
      transform: translateX(4px); 
    }

    /* ============================================================
       하단 네모 입력창 (Weather...)
       ============================================================ */
    .input-container {
      position: absolute;
      left: 12%;
      top: 62%;
      z-index: 2;
    }
    .weather-input {
      background: transparent;
      border: 1px solid #bfae99;
      color: #38221e;
      font-family: 'AppleGothic', CenturyGothic, AppleGothic, sans-serif;
      font-size: 16px;
      padding: 6px 14px;
      width: min(200px, 72vw);
      outline: none;
      letter-spacing: 0.5px;
    }
    .weather-input::placeholder {
      color: #bfae99;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.9; }
      50%       { opacity: 0.15; }
    }
    .weather-msg {
      display: none;
      margin-top: 7px;
      font-family: 'Jost', 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
      font-size: 7px;        /* ← 글씨 크기 여기 */
      letter-spacing: 2.5px;
      text-transform: none;
      color: #bfae99;
      animation: blink 2.4s ease-in-out infinite;
    }
    .weather-msg .blink { animation: none; }

    /* ============================================================
       비 캔버스 (모든 것 위에, 클릭 통과)
       ============================================================ */
    #rain-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 6;
    }

    /* ============================================================
       안개 캔버스 (최상단, 모든 것을 뿌옇게 덮음)
       ============================================================ */
    #fog-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 7;
    }

    /* ============================================================
       우하단 팽이 캔버스
       ============================================================ */
    #top-canvas {
      position: fixed;
      width: 280px; height: 360px;
      pointer-events: none; 
      z-index: 5; user-select: none; touch-action: none;
      transform-origin: center bottom;
      will-change: transform, left, top;
    }
    @media (max-width: 640px) {
      #top-canvas { width: 160px; height: 210px; }
      .menu-item   { font-size: 53px; }
      .weather-input { width: min(210px, 50vw); padding: 4px 10px; }
    }
  </style>
</head>
<body>

  <div class="menu-container">
    <a href="work1.html" class="menu-item">Work</a>
    <a href="ficciones.html" class="menu-item">Ficciones</a>
    <a href="career.html" class="menu-item" style="margin-left:5px">JayLim</a>
  </div>

  <div class="input-container">
    <input type="text" class="weather-input" placeholder="weather : rain / fog">
    <div class="weather-msg" id="weather-msg"></div>
  </div>

  <canvas id="rain-canvas"></canvas>
  <canvas id="fog-canvas"></canvas>
  <canvas id="top-canvas"></canvas>

<script>
(() => {
  // ---------- 정밀 세팅 변수 ----------
  const LINK        = 'rose.html'; 
  const INK         = '38,34,30';   
  let   SCALE;
  let   RIPPLE_Y;
  let   DOT_SCALE = 0.7;   // 모바일에서 점 크기 줄이는 배수
  const PERSP       = 4.0;
  const TILT        = 0.20;
  const HOVER_R     = 130; // 마우스 오버 감지 반경

  // 회전 속도 파트
  const SPIN_BASE   = 1.4;      // 오버 시 천천히 도는 기본 속도
  const SPIN_MAX    = 25;       // 드래그 최대 속도 제한

  // 물리 계수
  const FRICTION    = 0.993;    // 고속 회전 시 감속률
  const BRAKE_DECAY = 0.14;     // 클릭 시 제동력 곡선
  const DRAG_IMPULSE= 0.015;    // 드래그 가속 민감도

  const FLOAT_X     = 10, FLOAT_Y = 13;
  const DENSITY     = 1.6;           
  // ----------------------------------

  const cv=document.getElementById('top-canvas'), ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const rand=(a,b)=>a+Math.random()*(b-a);
  const D=n=>Math.round(n*DENSITY);

  let W,H,cx,cy,dpr;
  function resize(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    W=cv.clientWidth; H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    const mobile = window.innerWidth <= 640;
    SCALE     = Math.min(W,H) * (mobile ? 0.32 : 0.307);
    RIPPLE_Y  = H * 0.718;
    DOT_SCALE = mobile ? 0.8 : 1;
    cx=W*0.5; cy=H*(mobile ? 0.44 : 0.40);
  }
  resize(); addEventListener('resize',resize);

  // 입자 생성 루틴 (기존 유지)
  const body=[];
  function cone(y0,r0,y1,r1,n,oMul=1){
    for(let i=0;i<D(n);i++){
      const t=Math.random(), y=y0+(y1-y0)*t, r=r0+(r1-r0)*t, a=Math.random()*6.283;
      body.push({x:Math.cos(a)*r,z:Math.sin(a)*r,y,s:rand(0.6,1.6),o:rand(0.45,0.95)*oMul});
    }
  }
  function ring(y,r,n,jit,oMul=1){
    for(let i=0;i<D(n);i++){
      const a=Math.random()*6.283, rr=r+rand(-jit,jit);
      body.push({x:Math.cos(a)*rr,z:Math.sin(a)*rr,y:y+rand(-jit,jit),s:rand(0.8,1.8),o:rand(0.6,1)*oMul});
    }
  }
  function blob(yc,R,n,oMul=1){            
    for(let i=0;i<D(n);i++){
      const th=Math.random()*6.283, ph=Math.acos(rand(-1,1)), rr=R*Math.cbrt(Math.random());
      body.push({x:rr*Math.sin(ph)*Math.cos(th),z:rr*Math.sin(ph)*Math.sin(th),
                 y:yc+rr*Math.cos(ph),s:rand(0.7,1.6),o:rand(0.5,0.95)*oMul});
    }
  }
  cone( 1.32, 0.015, 0.65, 0.08, 100);  cone( 0.65, 0.08,  0.40, 0.18, 85);   
  cone( 0.40, 0.18,  0.25, 0.45, 110);  cone( 0.25, 0.45,  0.12, 0.98, 130);  
  cone( 0.12, 0.882, -0.02, 0.882, 100); ring( 0.12, 0.882, 120, 0.02, 1.0);    
  cone(-0.02, 0.882, -0.12, 0.648, 130); cone(-0.12, 0.648, -0.25, 0.405, 110); 
  cone(-0.25, 0.45, -0.38, 0.25, 90);   cone(-0.38, 0.25, -0.504, 0.15, 80);  
  blob(-0.552, 0.15, 90, 0.95);         

  const SQUASH=0.34, R_LIFE=2.6, R_MAXR=1.45, R_PERIOD=1.3;
  const dust=[];
  for(let i=0;i<D(60);i++){
    const a=Math.random()*6.283, rr=rand(0.2,0.9);
    dust.push({x:Math.cos(a)*rr,z:Math.sin(a)*rr,s:rand(0.4,1.1),o:rand(0.1,0.35)});
  }
  const rings=[]; let spawnT=0;

  // 인터랙션 플래그
  let angle=0, spin=0, t=0, hover=false;
  let mx=-9999,my=-9999, dragging=false, lastX=0, lastY=0;
  let isBraking = false;
  let pressScale=1, targetPress=1;   // 클릭 수축
  let cvLeft, cvTop;                 // 캔버스 위치 (JS 제어)

  function initPos(){
    cvLeft = window.innerWidth  - cv.clientWidth  - 24;
    cvTop  = window.innerHeight - cv.clientHeight - 24;
    cv.style.left = cvLeft+'px';
    cv.style.top  = cvTop +'px';
  }
  initPos(); addEventListener('resize', initPos);

  const near=()=>{ const c=cv.getBoundingClientRect();
    return Math.hypot(mx-(c.left+cx), my-(c.top+cy)) < HOVER_R; };

  // 이벤트 핸들러
  addEventListener('pointerdown',e=>{ mx=e.clientX; my=e.clientY;
    if(near()){ 
      dragging = true; 
      isBraking = true; 
      lastX = e.clientX;
      lastY = e.clientY;
      targetPress = 0.82;   // 클릭 시 수축
    } 
  });

  addEventListener('pointermove',e=>{
    mx=e.clientX; my=e.clientY;
    if(dragging){
      const deltaX = e.clientX - lastX;
      const deltaY = e.clientY - lastY;
      // 위치 이동
      cvLeft = Math.max(-cv.clientWidth*0.4,  Math.min(window.innerWidth  - cv.clientWidth*0.6,  cvLeft + deltaX));
      cvTop  = Math.max(-cv.clientHeight*0.4, Math.min(window.innerHeight - cv.clientHeight*0.6, cvTop  + deltaY));
      cv.style.left = cvLeft+'px';
      cv.style.top  = cvTop +'px';
      // 회전 (가로 드래그 방향)
      if (Math.abs(deltaX) > 1) { isBraking = false; }
      if (!isBraking) {
        spin += deltaX * DRAG_IMPULSE * 60;
        spin = Math.max(-SPIN_MAX, Math.min(SPIN_MAX, spin)); 
      }
      lastX = e.clientX;
      lastY = e.clientY;
    }
  });

  addEventListener('pointerup',()=>{ dragging = false; isBraking = false; targetPress = 1.0; });
  addEventListener('dblclick',e=>{ mx=e.clientX; my=e.clientY; if(near()) location.href=LINK; });          

  // ---------- 메인 루프 ----------
  function frame(dt){
    t+=dt;
    pressScale += (targetPress - pressScale) * Math.min(1, dt * 14);  // 수축 보간
    cv.style.transform = `scale(${pressScale})`;
    // 둥둥 떠다니는 모션은 상시 유지 (회전 유무와 무관)
    const fx=FLOAT_X*Math.sin(t*0.6), fy=FLOAT_Y*Math.sin(t*0.85+1.3);
    const roll=0.045*Math.sin(t*0.7);
    const tiltDyn=TILT+0.05*Math.sin(t*0.5), tcd=Math.cos(tiltDyn), tsd=Math.sin(tiltDyn);
    const rc=Math.cos(roll), rs=Math.sin(roll);

    hover = near();
    const fpsFactor = Math.min(dt * 60, 3); 

    // 💡 확연한 차이를 만드는 회전 통제 파트
    if (isBraking) {
      // 1. 클릭 브레이크 작동 시
      spin += (0.2 - spin) * BRAKE_DECAY * fpsFactor;
      if (Math.abs(spin) < 0.05) spin = 0.2;
    } 
    else if (!dragging) {
      // 2. 마우스를 대지 않은 일반 상태
      if (hover) {
        // [A] 마우스 오버 상태일 때만 회전 허용
        if (Math.abs(spin) > SPIN_BASE) {
          spin *= Math.pow(FRICTION, fpsFactor); // 고속 드래그 후 점진적 감속
        } else {
          const currentDir = spin >= 0 ? 1 : -1;
          const targetSpin = currentDir * SPIN_BASE;
          spin += (targetSpin - spin) * 0.08 * fpsFactor; // 베이스 속도로 수렴 후 계속 회전
        }
      } else {
        // [B] 💡 마우스가 벗어난 순간 즉시 회전 중단 (0 고정)
        spin = 0.2;
      }
    }

    angle+=spin*dt;
    const ca=Math.cos(angle), sa=Math.sin(angle);

    ctx.clearRect(0,0,W,H);
    const warp=(sx,sy)=>{const dx=sx-cx,dy=sy-cy;return[cx+dx*rc-dy*rs+fx, cy+dx*rs+dy*rc+fy];};

    for(const p of dust){
      const[sx,sy]=warp(cx+p.x*SCALE, RIPPLE_Y+p.z*SCALE*SQUASH);
      ctx.fillStyle=`rgba(${INK},${p.o})`; ctx.beginPath(); ctx.arc(sx,sy,p.s,0,6.283); ctx.fill();
    }
    spawnT-=dt; if(spawnT<=0){ rings.push({age:0}); spawnT=R_PERIOD; }
    for(let i=rings.length-1;i>=0;i--){
      const rg=rings[i]; rg.age+=dt; const pr=rg.age/R_LIFE;
      if(pr>=1){ rings.splice(i,1); continue; }
      const r=0.12+pr*R_MAXR, op=(1-pr)*Math.min(pr*5,1)*0.55;
      const nd=Math.floor(22+r*70);
      for(let k=0;k<nd;k++){
        const a=k/nd*6.283+rg.age, rr=r+rand(-0.015,0.015);
        const[sx,sy]=warp(cx+Math.cos(a)*rr*SCALE, RIPPLE_Y+Math.sin(a)*rr*SCALE*SQUASH);
        ctx.fillStyle=`rgba(${INK},${op*rand(0.6,1)})`; ctx.beginPath(); ctx.arc(sx,sy,rand(0.5,1.1),0,6.283); ctx.fill();
      }
    }
    const proj=[];
    for(const p of body){
      const x=p.x*ca-p.z*sa, z=p.x*sa+p.z*ca;
      const y2=p.y*tcd-z*tsd, z2=p.y*tsd+z*tcd, f=PERSP/(PERSP-z2);
      const[sx,sy]=warp(cx+x*SCALE*f, cy-y2*SCALE*f);
      proj.push({sx,sy,r:p.s*f,o:p.o*(0.40+0.60*((z2+1.4)/2.8)),d:z2});
    }
    proj.sort((a,b)=>a.d-b.d);
    for(const p of proj){ ctx.fillStyle=`rgba(${INK},${Math.min(p.o,1)})`; ctx.beginPath(); ctx.arc(p.sx,p.sy,p.r*DOT_SCALE,0,6.283); ctx.fill(); }
  }

  if(reduce){ frame(0); return; }
  let last=performance.now();
  (function loop(now){ const dt=Math.min((now-last)/1000,0.05); last=now; frame(dt); requestAnimationFrame(loop); })(last);

  // 인풋 엔터키 → 날씨 커맨드 + 인풋 초기화 + 메시지 표시
  const weatherInput = document.querySelector('.weather-input');
  const weatherMsg   = document.getElementById('weather-msg');
  const MSGS = {
    rain:  'it will rain until you say clear.',
    fog:   'the fog will hold until you say clear.',
  };
  function setMsg(key){
    if(key && MSGS[key]){
      weatherMsg.textContent = MSGS[key];
      weatherMsg.style.display = 'block';
    } else {
      weatherMsg.style.display = 'none';
    }
  }
  weatherInput.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const v = e.target.value.trim().toLowerCase();
    e.target.value = '';          // 입력 글 지우기
    e.target.blur();              // 키보드 닫기(모바일)
    // 날씨 이벤트 발행 — rain/fog/clear 스크립트가 구독
    window.dispatchEvent(new CustomEvent('weather', { detail: v }));
    if(v==='clear'||v==='stop'||v==='sun'||v==='') setMsg(null);
    else setMsg(v);
  });
})();
</script>

<!-- ============================================================
     RAIN — 'rain' 입력 시 비. 글씨/마우스/팽이를 고체로 인식해
     윗면에 부딪혀 튕기고(splash), 그 아래엔 비 그림자가 생김.
     바닥엔 빗방울 물결. ('clear'/'stop' 으로 끔)
     ============================================================ -->
<script>
(() => {
  const INK='38,34,30';
  const WIND=26;          // 바람(가로 흐름, px/s) → 빗줄기 기울기
  const GRAV=900;         // splash 입자 중력
  const MOUSE_R=42;       // 마우스 충돌 반경
  const SPAWN=10;         // 프레임당 생성량(밀도)
  const MAX_DROPS=320;

  const cv=document.getElementById('rain-canvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  const rand=(a,b)=>a+Math.random()*(b-a);

  let W,H,dpr;
  function resize(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    W=cv.clientWidth; H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize(); addEventListener('resize',resize);

  let mx=-9999,my=-9999;
  addEventListener('pointermove',e=>{ mx=e.clientX; my=e.clientY; });
  addEventListener('pointerout',()=>{ mx=-9999; my=-9999; });

  // 장애물 수집(매 프레임): 메뉴 글씨 rect + 마우스 원 + 팽이 타원
  function obstacles(){
    const rects=[];
    document.querySelectorAll('.menu-item').forEach(el=>{
      const r=el.getBoundingClientRect();
      if(r.width&&r.height) rects.push({l:r.left,t:r.top,r:r.right,b:r.bottom});
    });
    let mouse=null;
    if(mx>-9000) mouse={x:mx,y:my,r:MOUSE_R};
    let top=null;
    const tc=document.getElementById('top-canvas');
    if(tc){ const r=tc.getBoundingClientRect();
      top={x:r.left+r.width*0.5, y:r.top+r.height*0.42, rx:r.width*0.30, ry:r.height*0.26}; }
    return {rects,mouse,top};
  }

  const drops=[];     // {x,y,vy,len}
  const parts=[];     // splash 입자 {x,y,vx,vy,age,ttl}
  const ripples=[];   // 물결 {x,y,age,ttl,maxr}
  let active=false;

  function splash(x,y,big){
    const n = big?6:4;
    for(let i=0;i<n;i++)
      parts.push({x,y,vx:rand(-70,70),vy:rand(-150,-40),age:0,ttl:rand(.25,.5)});
    if(big) ripples.push({x,y,age:0,ttl:.55,maxr:rand(10,18)});
  }

  function hitTest(x,y,ob){
    for(const r of ob.rects) if(x>=r.l&&x<=r.r&&y>=r.t&&y<=r.b) return {x,y:r.t,big:false};
    if(ob.mouse){ const m=ob.mouse; if((x-m.x)**2+(y-m.y)**2 < m.r*m.r) return {x,y,big:false}; }
    if(ob.top){ const o=ob.top; if(((x-o.x)/o.rx)**2+((y-o.y)/o.ry)**2 < 1) return {x,y,big:true}; }
    return null;
  }

  let last=performance.now();
  function loop(now){
    const dt=Math.min((now-last)/1000,0.05); last=now;
    const ob=obstacles();

    // 생성
    if(active && drops.length<MAX_DROPS){
      for(let i=0;i<SPAWN;i++)
        drops.push({x:rand(-40,W+40), y:rand(-H*0.3,0), vy:rand(620,820), len:rand(12,22)});
    }

    ctx.clearRect(0,0,W,H);

    // 빗줄기
    ctx.lineWidth=1.1; ctx.lineCap='round';
    for(let i=drops.length-1;i>=0;i--){
      const d=drops[i];
      d.y+=d.vy*dt; d.x+=WIND*dt;
      // 충돌 → splash 후 소멸
      const hit=hitTest(d.x,d.y,ob);
      if(hit){ splash(hit.x,hit.y,hit.big); drops.splice(i,1); continue; }
      // 바닥 → 물결
      if(d.y>=H-2){ splash(d.x,H-2,true); drops.splice(i,1); continue; }
      const tailX=d.x-WIND*0.05, tailY=d.y-d.len;
      ctx.strokeStyle=`rgba(${INK},0.28)`;
      ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(tailX,tailY); ctx.stroke();
    }

    // splash 입자
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i]; p.age+=dt;
      if(p.age>=p.ttl){ parts.splice(i,1); continue; }
      p.vy+=GRAV*dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
      ctx.fillStyle=`rgba(${INK},${0.45*(1-p.age/p.ttl)})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,1.1,0,6.283); ctx.fill();
    }

    // 물결(납작한 타원 링)
    for(let i=ripples.length-1;i>=0;i--){
      const r=ripples[i]; r.age+=dt; const k=r.age/r.ttl;
      if(k>=1){ ripples.splice(i,1); continue; }
      const rr=r.maxr*k, op=0.32*(1-k);
      ctx.strokeStyle=`rgba(${INK},${op})`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.ellipse(r.x,r.y,rr,rr*0.34,0,0,6.283); ctx.stroke();
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // 'weather' 커스텀 이벤트 구독
  addEventListener('weather', e=>{
    const v=e.detail;
    if(v==='rain') active=true;
    else if(v==='clear'||v==='stop'||v==='sun'||v==='') active=false;
  });
})();
</script>
<!-- ============================================================
     FOG — 'fog' 입력 시 흰 안개. 부드러운 구름 덩어리가 바람 따라
     흐르며 둥실둥실 + 숨쉬듯 팽창. 글씨/팽이/비 다 뿌옇게 덮음.
     ('clear'/'stop'/'sun' 으로 끔)
     ============================================================ -->
<script>
(() => {
  const cv=document.getElementById('fog-canvas'); if(!cv) return;
  const ctx=cv.getContext('2d');
  const rand=(a,b)=>a+Math.random()*(b-a);

  // 부드러운 흰 덩어리 스프라이트(가장자리로 갈수록 투명)
  const sprite=document.createElement('canvas'); sprite.width=sprite.height=256;
  { const s=sprite.getContext('2d');
    const g=s.createRadialGradient(128,128,0,128,128,128);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.5,'rgba(255,255,255,0.85)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    s.fillStyle=g; s.fillRect(0,0,256,256); }

  let W,H,dpr,clouds=[];
  function build(){
    clouds=[];
    const n=Math.round((W*H)/230000)+3;        // 덩어리 수(적게 → 사이사이 배경 보임)
    for(let i=0;i<n;i++){
      const rx=rand(195,390), ry=rx*rand(0.42,0.6);   // 가로로 퍼진 덩어리 (1.3배 키움)
      const lobes=[];
      const m=Math.round(rand(6,11));
      for(let j=0;j<m;j++){
        const ang=rand(0,6.28), rad=Math.sqrt(Math.random());
        const dx=Math.cos(ang)*rx*rad;
        const dy=Math.sin(ang)*ry*rad*0.7 - ry*0.12;   // 바닥은 평평, 위로 몽글
        const lr=rand(0.5,0.95)*ry*(1.1-rad*0.4);      // 가운데 크고 가장자리 작게
        lobes.push({dx, dy, r:lr, a:rand(0.13,0.24),
                    bob:rand(0.6,1.4), ph:rand(0,6.28)});
      }
      clouds.push({ x:rand(-rx,W+rx), y:rand(H*0.05,H*0.85), rx, lobes,
                    vx:rand(5,13), bob:rand(0.15,0.4), ph:rand(0,6.28) });
    }
  }
  function resize(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    W=cv.clientWidth; H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    build();
  }
  resize(); addEventListener('resize',resize);

  let cur=0, target=0, t=0, last=performance.now();
  function loop(now){
    const dt=Math.min((now-last)/1000,0.05); last=now; t+=dt;
    cur += (target-cur)*Math.min(1,dt*1.2);      // 부드럽게 켜짐/꺼짐
    ctx.clearRect(0,0,W,H);
    if(cur>0.003){
      for(const c of clouds){
        c.x += c.vx*dt;
        const cy=c.y + Math.sin(t*c.bob+c.ph)*14;          // 덩어리 전체 둥실
        if(c.x - c.rx*1.8 > W){ c.x=-c.rx*1.8; c.y=rand(H*0.05,H*0.85); }
        for(const l of c.lobes){
          const ly=cy + l.dy + Math.sin(t*l.bob+l.ph)*5;    // 표면 몽글 움직임
          const lr=l.r*(1+Math.sin(t*0.5+l.ph)*0.05);       // 숨쉬듯
          ctx.globalAlpha=l.a*cur;
          ctx.drawImage(sprite, c.x+l.dx-lr, ly-lr, lr*2, lr*2);
        }
      }
      ctx.globalAlpha=1;
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // 'weather' 커스텀 이벤트 구독
  addEventListener('weather', e=>{
    const v=e.detail;
    if(v==='fog') target=1;
    else if(v==='clear'||v==='stop'||v==='sun'||v==='') target=0;
  });
})();
</script>
